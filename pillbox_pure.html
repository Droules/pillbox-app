<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>小药盒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F0F0F0;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
.phone{width:375px;height:812px;border-radius:40px;overflow:hidden;border:8px solid #1a1a1a;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;background:#FFF8F0;display:flex;flex-direction:column}
.phone *::-webkit-scrollbar{display:none}
.phone *{scrollbar-width:none}

/* Status bar */
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:12px;font-weight:600;flex-shrink:0}
.status-bar .time{font-size:14px;font-weight:700}

/* Content area */
.content{flex:1;overflow-y:auto;padding:0 20px 20px}

/* Tab bar */
.tab-bar{height:80px;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding-bottom:16px}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.tab-item:active{transform:scale(.9)}
.tab-item .icon{font-size:22px;line-height:1}
.tab-item .label{font-size:10px;color:#999}
.tab-item.active .label{color:#5BA97B;font-weight:600}

/* Page transitions */
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* === HOME PAGE === */
.greeting{font-size:24px;font-weight:700;color:#333;margin:16px 0 4px}
.greeting-sub{font-size:13px;color:#999;margin-bottom:16px}
.summary-row{display:flex;gap:12px;margin-bottom:16px}
.summary-card{flex:1;background:#fff;border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.summary-card .num{font-size:28px;font-weight:700;color:#5BA97B}
.summary-card .desc{font-size:11px;color:#999;margin-top:2px}
.section-title{font-size:15px;font-weight:600;color:#333;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.med-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);cursor:pointer;transition:transform .15s,box-shadow .15s;animation:slideUp .4s ease backwards}
.med-card:nth-child(2){animation-delay:.05s}
.med-card:nth-child(3){animation-delay:.1s}
.med-card:nth-child(4){animation-delay:.15s}
.med-card:nth-child(5){animation-delay:.2s}
.med-card:active{transform:scale(.97);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.med-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.med-info{flex:1;min-width:0}
.med-name{font-size:14px;font-weight:600;color:#333}
.med-dose{font-size:11px;color:#999;margin-top:2px}
.med-status{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500;flex-shrink:0}
.med-status.taken{background:#E8F5E9;color:#5BA97B}
.med-status.pending{background:#FFF3E0;color:#F4A460}
.med-status.done-all{background:#E8F5E9;color:#5BA97B}

/* Progress ring */
.progress-wrap{display:flex;align-items:center;justify-content:center;margin:10px 0 6px}
.progress-ring{position:relative;width:100px;height:100px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:8}
.progress-ring .bg{stroke:#eee}
.progress-ring .fg{stroke:#5BA97B;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.progress-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-text .pct{font-size:24px;font-weight:700;color:#5BA97B}
.progress-text .lbl{font-size:10px;color:#999}

/* === MEDICINE LIST PAGE === */
.med-list-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);animation:slideUp .4s ease backwards}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;display:inline-block;margin-top:4px}
.badge.cardiovascular{background:#FFEBEE;color:#E57373}
.badge.digest{background:#FFF3E0;color:#FFB74D}
.badge.vitamin{background:#E8F5E9;color:#66BB6A}
.badge.pain{background:#F3E5F5;color:#BA68C8}
.stock-warn{font-size:10px;color:#E57373;font-weight:600;margin-top:2px}

/* === CALENDAR PAGE === */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin:16px 0 12px}
.cal-header .month{font-size:18px;font-weight:700;color:#333}
.cal-nav{width:32px;height:32px;border-radius:50%;background:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.cal-nav:active{background:#f0f0f0}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:#999;margin-bottom:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;font-size:13px;color:#333;cursor:pointer;position:relative;transition:background .15s}
.cal-day:hover{background:#f5f5f5}
.cal-day.today{background:#5BA97B;color:#fff;font-weight:700}
.cal-day.selected{outline:2px solid #5BA97B;outline-offset:-2px}
.cal-day .dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.cal-day .dot.green{background:#5BA97B}
.cal-day .dot.yellow{background:#F4A460}
.cal-day .dot.empty{background:transparent}
.cal-day.other{color:#ccc}
.cal-detail{background:#fff;border-radius:16px;padding:14px;margin-top:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);animation:fadeIn .3s ease}
.cal-detail-title{font-size:14px;font-weight:600;color:#333;margin-bottom:8px}
.cal-detail-item{font-size:12px;color:#666;padding:4px 0;display:flex;align-items:center;gap:6px}

/* === STATS PAGE === */
.stat-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-card h3{font-size:14px;font-weight:600;color:#333;margin-bottom:12px}
.bar-chart{display:flex;align-items:flex-end;justify-content:space-around;height:120px;gap:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(to top,#5BA97B,#81C784);transition:height .6s ease;min-height:4px}
.bar-label{font-size:10px;color:#999}
.bar-value{font-size:10px;color:#5BA97B;font-weight:600}
.streak-row{display:flex;gap:12px}
.streak-card{flex:1;text-align:center;padding:12px;background:#F9FBF9;border-radius:12px}
.streak-card .num{font-size:28px;font-weight:700;color:#5BA97B}
.streak-card .lbl{font-size:11px;color:#999;margin-top:2px}

/* === PROFILE PAGE === */
.profile-header{text-align:center;padding:20px 0}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#81C784,#5BA97B);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 8px}
.profile-name{font-size:18px;font-weight:700;color:#333}
.profile-sub{font-size:12px;color:#999}
.settings-group{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:12px}
.settings-item{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .15s}
.settings-item:last-child{border-bottom:none}
.settings-item:active{background:#f9f9f9}
.settings-item .left{display:flex;align-items:center;gap:10px;font-size:14px;color:#333}
.settings-item .left span:first-child{font-size:18px}
.settings-item .arrow{color:#ccc;font-size:14px}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="time" id="statusTime">9:41</span>
    <span>📶 🔋</span>
  </div>
  <div class="content" id="content"></div>
  <div class="tab-bar" id="tabBar"></div>
</div>
<script>
// ===== DATA =====
const medicines = [
  {id:1,name:"阿莫西林胶囊",dose:"0.5g",freq:"每日3次",times:["08:00","12:00","18:00"],category:"消化系统",icon:"💊",color:"#FFF3E0",stock:5},
  {id:2,name:"氨氯地平片",dose:"5mg",freq:"每日1次",times:["08:00"],category:"心血管",icon:"❤️",color:"#FFEBEE",stock:30},
  {id:3,name:"维生素D3",dose:"1粒",freq:"每日1次",times:["08:00"],category:"维生素",icon:"☀️",color:"#E8F5E9",stock:45},
  {id:4,name:"布洛芬缓释胶囊",dose:"0.3g",freq:"需要时",times:[],category:"止痛",icon:"🩹",color:"#F3E5F5",stock:12},
  {id:5,name:"益生菌",dose:"1袋",freq:"每日2次",times:["08:00","20:00"],category:"消化系统",icon:"🦠",color:"#FFF3E0",stock:3}
];

const categoryClass = {"心血管":"cardiovascular","消化系统":"digest","维生素":"vitamin","止痛":"pain"};

// Medication taken records: {dateStr: {medId_time: true}}
let takenRecords = {};
// Initialize some past data
(function initRecords(){
  const today = new Date();
  for(let d=1;d<=7;d++){
    const dt = new Date(today);
    dt.setDate(dt.getDate()-d);
    const key = dateKey(dt);
    takenRecords[key]={};
    medicines.forEach(m=>{
      m.times.forEach(t=>{
        if(Math.random()>0.2) takenRecords[key][m.id+"_"+t]=true;
      });
    });
  }
  // Today partial
  const tk = dateKey(today);
  takenRecords[tk]={};
  medicines.forEach(m=>{
    if(m.times.length>0 && m.times[0]==="08:00" && Math.random()>0.4){
      takenRecords[tk][m.id+"_08:00"]=true;
    }
  });
})();

function dateKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

// ===== STATE =====
let currentTab = "home";
let calYear, calMonth, calSelected;
(function(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();calSelected=dateKey(n)})();

// ===== TABS =====
const tabs = [
  {id:"home",icon:"🏠",label:"首页"},
  {id:"meds",icon:"💊",label:"药品"},
  {id:"calendar",icon:"📅",label:"日历"},
  {id:"stats",icon:"📊",label:"统计"},
  {id:"profile",icon:"👤",label:"我的"}
];

function renderTabs(){
  const bar=document.getElementById("tabBar");
  bar.innerHTML=tabs.map(t=>`<div class="tab-item ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')"><span class="icon">${t.icon}</span><span class="label">${t.label}</span></div>`).join("");
}

function switchTab(id){
  currentTab=id;
  renderTabs();
  renderPage();
}

// ===== PAGES =====
function renderPage(){
  const c=document.getElementById("content");
  c.scrollTop=0;
  switch(currentTab){
    case"home":c.innerHTML=renderHome();break;
    case"meds":c.innerHTML=renderMeds();break;
    case"calendar":c.innerHTML=renderCalendar();break;
    case"stats":c.innerHTML=renderStats();break;
    case"profile":c.innerHTML=renderProfile();break;
  }
  // Animate progress rings
  setTimeout(()=>{
    document.querySelectorAll('.progress-ring .fg').forEach(el=>{
      const target=el.getAttribute('data-target');
      if(target) el.style.strokeDashoffset=target;
    });
  },50);
}

// ===== HOME =====
function getGreeting(){
  const h=new Date().getHours();
  if(h<6)return["🌙 晚安","记得按时吃药哦"];
  if(h<12)return["🌅 早上好","新的一天，按时服药~"];
  if(h<18)return["☀️ 下午好","别忘了下午的药哦"];
  return["🌙 晚上好","今天的药都吃了吗？"];
}

function getTodaySchedule(){
  const tk=dateKey(new Date());
  const schedule=[];
  medicines.forEach(m=>{
    m.times.forEach(t=>{
      const taken=!!(takenRecords[tk]&&takenRecords[tk][m.id+"_"+t]);
      schedule.push({med:m,time:t,taken});
    });
  });
  schedule.sort((a,b)=>a.time.localeCompare(b.time));
  return schedule;
}

function toggleTaken(medId,time){
  const tk=dateKey(new Date());
  if(!takenRecords[tk])takenRecords[tk]={};
  const key=medId+"_"+time;
  takenRecords[tk][key]=!takenRecords[tk][key];
  renderPage();
}

function renderHome(){
  const[greet,sub]=getGreeting();
  const schedule=getTodaySchedule();
  const total=schedule.length;
  const done=schedule.filter(s=>s.taken).length;
  const pct=total?Math.round(done/total*100):100;
  const streak=calcStreak();

  const circumference=2*Math.PI*42;
  const offset=circumference-(pct/100)*circumference;

  let html=`<div class="greeting">${greet}</div><div class="greeting-sub">${sub}</div>`;

  html+=`<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
    <div class="progress-ring"><svg width="100" height="100"><circle class="bg" cx="50" cy="50" r="42"/><circle class="fg" cx="50" cy="50" r="42" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" data-target="${offset}"/></svg><div class="progress-text"><span class="pct">${pct}%</span><span class="lbl">今日完成</span></div></div>
    <div style="flex:1"><div class="summary-card" style="margin-bottom:8px"><div class="num">${streak}</div><div class="desc">连续打卡天数 🔥</div></div><div class="summary-card"><div class="num">${medicines.length}</div><div class="desc">管理药品数</div></div></div></div>`;

  html+=`<div class="section-title">📋 今日用药计划</div>`;
  if(schedule.length===0){
    html+=`<div style="text-align:center;padding:30px;color:#999;font-size:13px">今天没有需要服用的药物 🎉</div>`;
  } else {
    schedule.forEach(s=>{
      html+=`<div class="med-card" onclick="toggleTaken(${s.med.id},'${s.time}')">
        <div class="med-icon" style="background:${s.med.color}">${s.med.icon}</div>
        <div class="med-info"><div class="med-name">${s.med.name}</div><div class="med-dose">${s.med.dose} · ${s.time}</div></div>
        <div class="med-status ${s.taken?'taken':'pending'}">${s.taken?'已服用 ✓':'待服用'}</div>
      </div>`;
    });
  }
  return html;
}

function calcStreak(){
  let streak=0;
  const today=new Date();
  for(let d=1;d<=30;d++){
    const dt=new Date(today);dt.setDate(dt.getDate()-d);
    const tk=dateKey(dt);
    const rec=takenRecords[tk];
    if(!rec)break;
    let total=0,done=0;
    medicines.forEach(m=>{m.times.forEach(t=>{total++;if(rec[m.id+"_"+t])done++})});
    if(total===0||done/total<0.8)break;
    streak++;
  }
  return streak;
}

// ===== MEDICINE LIST =====
function renderMeds(){
  let html=`<div class="section-title" style="margin-top:16px">💊 我的药品 (${medicines.length})</div>`;
  medicines.forEach((m,i)=>{
    const cls=categoryClass[m.category]||"vitamin";
    html+=`<div class="med-list-card" style="animation-delay:${i*0.05}s">
      <div class="med-icon" style="background:${m.color}">${m.icon}</div>
      <div class="med-info">
        <div class="med-name">${m.name}</div>
        <div class="med-dose">${m.dose} · ${m.freq}</div>
        <span class="badge ${cls}">${m.category}</span>
        ${m.stock<=5?`<div class="stock-warn">⚠️ 库存不足：剩余${m.stock}粒</div>`:''}
      </div>
    </div>`;
  });
  html+=`<div style="text-align:center;padding:20px"><div style="width:52px;height:52px;border-radius:50%;background:#5BA97B;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;box-shadow:0 4px 12px rgba(91,169,123,.4);transition:transform .15s" onclick="alert('添加药品功能演示 🎉')" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">+</div><div style="font-size:11px;color:#999;margin-top:6px">添加药品</div></div>`;
  return html;
}

// ===== CALENDAR =====
function renderCalendar(){
  const monthNames=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  let html=`<div class="cal-header">
    <button class="cal-nav" onclick="calPrev()">◀</button>
    <span class="month">${calYear}年 ${monthNames[calMonth]}</span>
    <button class="cal-nav" onclick="calNext()">▶</button>
  </div>`;
  html+=`<div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>`;
  html+=`<div class="cal-grid">`;

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const todayKey=dateKey(new Date());

  // Previous month padding
  for(let i=firstDay-1;i>=0;i--){
    html+=`<div class="cal-day other">${prevDays-i}</div>`;
  }

  // Current month days
  for(let d=1;d<=daysInMonth;d++){
    const dk=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const isToday=dk===todayKey;
    const isSel=dk===calSelected;
    let dotClass="empty";
    const rec=takenRecords[dk];
    if(rec){
      let total=0,done=0;
      medicines.forEach(m=>{m.times.forEach(t=>{total++;if(rec[m.id+"_"+t])done++})});
      if(total>0) dotClass=done/total>=0.8?"green":"yellow";
    }
    html+=`<div class="cal-day${isToday?' today':''}${isSel&&!isToday?' selected':''}" onclick="calSelect('${dk}')">
      ${d}<div class="dot ${dotClass}"></div></div>`;
  }

  // Next month padding
  const totalCells=firstDay+daysInMonth;
  const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let i=1;i<=remaining;i++){
    html+=`<div class="cal-day other">${i}</div>`;
  }
  html+=`</div>`;

  // Detail for selected date
  html+=renderCalDetail();
  return html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderPage()}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderPage()}
function calSelect(dk){calSelected=dk;renderPage()}

function renderCalDetail(){
  const rec=takenRecords[calSelected]||{};
  const items=[];
  medicines.forEach(m=>{
    m.times.forEach(t=>{
      const taken=!!rec[m.id+"_"+t];
      items.push({name:m.name,icon:m.icon,time:t,taken});
    });
  });
  items.sort((a,b)=>a.time.localeCompare(b.time));

  if(items.length===0) return `<div class="cal-detail"><div class="cal-detail-title">📋 ${calSelected}</div><div style="color:#999;font-size:12px;padding:8px 0">当天无用药记录</div></div>`;

  let html=`<div class="cal-detail"><div class="cal-detail-title">📋 ${calSelected}</div>`;
  items.forEach(it=>{
    html+=`<div class="cal-detail-item">${it.icon} ${it.time} ${it.name} — <span style="color:${it.taken?'#5BA97B':'#F4A460'};font-weight:500">${it.taken?'已服用 ✓':'未服用'}</span></div>`;
  });
  html+=`</div>`;
  return html;
}

// ===== STATS =====
function renderStats(){
  let html=`<div class="section-title" style="margin-top:16px">📊 服药统计</div>`;

  // Weekly bar chart
  html+=`<div class="stat-card"><h3>近7天服药率</h3><div class="bar-chart">`;
  const dayLabels=["日","一","二","三","四","五","六"];
  const today=new Date();
  for(let d=6;d>=0;d--){
    const dt=new Date(today);dt.setDate(dt.getDate()-d);
    const dk=dateKey(dt);
    const rec=takenRecords[dk]||{};
    let total=0,done=0;
    medicines.forEach(m=>{m.times.forEach(t=>{total++;if(rec[m.id+"_"+t])done++})});
    const pct=total?Math.round(done/total*100):0;
    const dayLabel=dayLabels[dt.getDay()];
    html+=`<div class="bar-col"><div class="bar-value">${pct}%</div><div class="bar" style="height:${Math.max(pct,4)}%"></div><div class="bar-label">${dayLabel}</div></div>`;
  }
  html+=`</div></div>`;

  // Streaks
  const streak=calcStreak();
  const bestStreak=Math.max(streak,streak+Math.floor(Math.random()*3)+1);
  html+=`<div class="stat-card"><h3>打卡成就</h3><div class="streak-row">
    <div class="streak-card"><div class="num">${streak}</div><div class="lbl">当前连续 🔥</div></div>
    <div class="streak-card"><div class="num">${bestStreak}</div><div class="lbl">最佳记录 🏆</div></div>
  </div></div>`;

  // Per-medicine stats
  html+=`<div class="stat-card"><h3>各药品服药率</h3>`;
  medicines.filter(m=>m.times.length>0).forEach(m=>{
    let total=0,done=0;
    for(let d=0;d<7;d++){
      const dt=new Date(today);dt.setDate(dt.getDate()-d);
      const dk=dateKey(dt);
      const rec=takenRecords[dk]||{};
      m.times.forEach(t=>{total++;if(rec[m.id+"_"+t])done++});
    }
    const pct=total?Math.round(done/total*100):0;
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:16px">${m.icon}</span>
      <span style="font-size:12px;color:#333;flex:1">${m.name}</span>
      <div style="width:100px;height:8px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(to right,#81C784,#5BA97B);border-radius:4px;transition:width .6s ease"></div></div>
      <span style="font-size:11px;color:#5BA97B;font-weight:600;width:36px;text-align:right">${pct}%</span>
    </div>`;
  });
  html+=`</div>`;
  return html;
}
